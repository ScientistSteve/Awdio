# Builds the Android app on every main-branch push/PR and on manual dispatch.
# The job installs Temurin 17, sets up the Android Gradle environment, caches Gradle,
# compiles an arm64-v8a debug APK, and uploads the APK artifact. Release signing is
# intentionally omitted because this repository does not include a keystore.
name: Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Build arm64 debug APK
        run: ./gradlew assembleDebug --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: awdio-arm64-v8a-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
